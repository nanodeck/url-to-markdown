apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-to-markdown.fullname" . }}
  labels:
    {{- include "url-to-markdown.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "url-to-markdown.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "url-to-markdown.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "url-to-markdown.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "url-to-markdown.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "url-to-markdown.fullname" . }}
            - secretRef:
                name: {{ include "url-to-markdown.fullname" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
