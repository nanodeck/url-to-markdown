# Flux CD - deploy url-to-markdown Helm chart from OCI registry
#
# Prerequisites:
#   - Flux v2 installed on the cluster
#   - Create the APP_KEY secret:
#     kubectl create secret generic url-to-markdown-app-key \
#       -n url-to-markdown \
#       --from-literal=appKey=$(openssl rand -base64 32)
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: url-to-markdown
  namespace: flux-system
spec:
  type: oci
  interval: 10m
  url: oci://ghcr.io/nanodeck/charts

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: url-to-markdown
  namespace: url-to-markdown
spec:
  interval: 10m
  chart:
    spec:
      chart: url-to-markdown
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: url-to-markdown
        namespace: flux-system
  values:
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 60
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
    config:
      APP_URL: "https://url-to-markdown.example.com"
      LOG_LEVEL: warn
      RATE_LIMIT_REQUESTS: "120"
  valuesFrom:
    - kind: Secret
      name: url-to-markdown-app-key
      valuesKey: appKey
      targetPath: appKey
